content: 'This design used the historic mark that Stearns has, as well as one of their houses, as the major design components.  I used an actual image for the sign, cutting it to build the height.  I "drew" the siding and grass in photoshop.  The menu is very wide, giving the main content less width to work with, though it does have a lot of height since there is no header.'
