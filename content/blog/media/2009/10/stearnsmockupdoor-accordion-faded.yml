file: 2009/10/stearnsmockupdoor-accordion-faded.jpg
content: "This was a modification of the other door design, at the suggestion of the instructor.  It has navigation on the side, with accordion style drop down sub-menus.  It took a lot of effort to get the icons looking good on the side.  I tried various things with the icons themselves, such as having them bigger with the text on them (had to be huge to work) and using just their head sticking off the side (didn't really work).  I also, with the help of the instructor, tried various positionings of the text.  I think the final version looks pretty good, though still perhaps a little uneven."
