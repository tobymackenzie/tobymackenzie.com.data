file: 2009/10/stearnsmockupdoor-2.jpg
content: "This design is supposed to be an open barn door, though the door itself is not visible, only the doorway.  There is a sign overhead.  Due to the suggestion of the instructor, I put it right on the door frame instead of above the frame to conserve space and make it cleaner.  Putting the text on the animal silhouettes doesn't look that clean though, so the instructor didn't want me to present this one.  I like the fact that it allows for a three column home page, though, giving lots of real estate above the fold. "
