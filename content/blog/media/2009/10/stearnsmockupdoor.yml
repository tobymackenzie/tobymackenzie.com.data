content: "The recipes page of this design.  I figured the recipes would each be a separate page on the site, with either links to featured recipes or categories on the main page and a search box to find recipes.  I drew the search icon in Photoshop on the suggestion of my classmates, as they didn't like the text button I had.  This, like most of my content elements, was used on  all designs."
